[tools]
go = "1.21"
gofumpt = "0.10.0"
golangci-lint = "2.12.2"

[env]
GOFLAGS = "-ldflags=-linkmode=external"

[tasks.check]
description = "Run formatting checks and tests"
run = """
scripts/check-go-style.sh
golangci-lint run ./...
go test ./...
"""

[tasks.fix]
description = "Format Go files"
run = "gofumpt -w $(find . -name '*.go' -not -path './.git/*')"
